<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>NE Times Content Pipeline</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
    header{background:#1e293b;padding:14px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155}
    header h1{font-size:1.15rem;font-weight:600}
    .badge{background:#334155;padding:4px 10px;border-radius:999px;font-size:.75rem}
    .badge.running{background:#16a34a;animation:pulse 1.5s infinite;cursor:pointer}
    .badge.running.stop-hover{background:#b91c1c;animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    main{padding:20px;max-width:1300px;margin:0 auto}

    /* Form */
    .form-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    input[type=text]{flex:1;min-width:250px;padding:10px 14px;border:1px solid #334155;border-radius:8px;background:#1e293b;color:#e2e8f0;font-size:.9rem}
    select{padding:10px 14px;border:1px solid #334155;border-radius:8px;background:#1e293b;color:#e2e8f0;font-size:.9rem;min-width:120px}
    button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:500}
    #btn-run{background:#3b82f6;color:white}
    #btn-run:disabled{background:#475569;cursor:not-allowed}

    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
    .tab{padding:8px 16px;border-radius:8px 8px 0 0;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:.85rem;border:1px solid #334155;border-bottom:none}
    .tab.active{background:#0f172a;color:#e2e8f0;border-color:#3b82f6;border-bottom:1px solid #0f172a}

    /* Panels */
    .panel{background:#1e293b;border-radius:0 12px 12px 12px;padding:20px;min-height:300px;display:none;border:1px solid #334155}
    .panel.active{display:block}
    .panel h2{font-size:.85rem;font-weight:600;color:#94a3b8;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}

    /* Article */
    .article-text{white-space:pre-wrap;line-height:1.8;font-size:.95rem;color:#f1f5f9}
    .stat{display:inline-block;background:#334155;padding:3px 10px;border-radius:12px;font-size:.75rem;margin-right:6px;margin-bottom:8px}
    .stat.pass{background:#14532d;color:#4ade80}
    .stat.fail{background:#7f1d1d;color:#fca5a5}

    /* Lists */
    .vocab-tag{display:inline-block;background:#1e3a5f;color:#93c5fd;padding:4px 12px;border-radius:999px;font-size:.8rem;margin:3px 4px 3px 0}
    .source-link{color:#60a5fa;font-size:.85rem;text-decoration:none;display:block;margin:4px 0}
    .source-link:hover{text-decoration:underline}

    /* Checklist */
    .check-item{padding:8px 0;border-bottom:1px solid #1e293b;font-size:.85rem}
    .check-item .status{font-weight:700;margin-right:6px}
    .check-item .status.pass{color:#4ade80}
    .check-item .status.fail{color:#f87171}

    /* Suggestions */
    .suggestion{padding:12px 0;border-bottom:1px solid #334155}
    .suggestion .orig{color:#fbbf24;font-size:.85rem;font-style:italic}
    .suggestion .arrow{color:#64748b;margin:4px 0;font-size:.8rem}
    .suggestion .sugg{color:#4ade80;font-size:.85rem}
    .suggestion .reason{color:#94a3b8;font-size:.8rem;margin-top:4px}

    /* Crossword */
    .cw-card{background:#0f172a;border-radius:8px;padding:14px;margin-bottom:10px}
    .cw-word{font-weight:700;color:#f59e0b;font-size:.95rem}
    .cw-korean{color:#94a3b8;font-size:.8rem;margin-left:8px}
    .cw-sentence{font-size:.85rem;margin:4px 0 0 12px;line-height:1.5}
    .cw-label{color:#64748b;font-size:.75rem;font-weight:600;margin-right:6px}

    /* Workbook */
    .wb-set{background:#0f172a;border-radius:8px;padding:16px;margin-bottom:14px}
    .wb-set h3{font-size:.9rem;color:#f59e0b;margin-bottom:10px}
    .wb-section{margin-bottom:12px}
    .wb-section h4{font-size:.8rem;color:#94a3b8;margin-bottom:6px;text-transform:uppercase}
    .wb-section p,.wb-section li{font-size:.85rem;line-height:1.6}
    .wb-section ul{padding-left:18px}

    /* Log */
    #log-box{height:200px;overflow-y:auto;font-family:monospace;font-size:.8rem;line-height:1.5;color:#a3e635;background:#0f172a;border-radius:8px;padding:12px}
    #log-box p{margin:1px 0}

    /* Image panel */
    .img-panel{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
    .img-preview{flex:0 0 auto}
    .img-preview img{width:340px;max-width:100%;border-radius:10px;cursor:pointer;border:2px solid #334155;transition:border-color .2s}
    .img-preview img:hover{border-color:#3b82f6}
    .img-no-image{width:340px;height:220px;background:#0f172a;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#475569;font-size:.85rem;border:2px dashed #334155}
    .img-info{flex:1;min-width:200px}
    .img-info p{font-size:.85rem;color:#94a3b8;word-break:break-all;margin-bottom:12px}
    .btn-search{background:#f59e0b;color:#0f172a;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;text-decoration:none;display:inline-block}
    .btn-search:hover{background:#fbbf24}

    /* History modal */
    #history-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;align-items:flex-start;justify-content:center;padding-top:60px}
    #history-modal.open{display:flex}
    .history-box{background:#1e293b;border-radius:12px;width:640px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;border:1px solid #334155}
    .history-header{padding:16px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
    .history-header h3{font-size:.95rem;font-weight:600}
    .history-close{background:none;border:none;color:#94a3b8;font-size:1.4rem;cursor:pointer;padding:0}
    .history-list{overflow-y:auto;flex:1;padding:12px}
    .history-item{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;gap:12px;align-items:center;border:1px solid transparent}
    .history-item:hover{background:#0f172a;border-color:#334155}
    .hi-badge{font-size:.7rem;padding:3px 8px;border-radius:999px;background:#334155;white-space:nowrap}
    .hi-topic{font-size:.9rem;font-weight:500;flex:1}
    .hi-meta{font-size:.75rem;color:#64748b;white-space:nowrap}

    /* Lightbox */
    #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center}
    #lightbox.open{display:flex}
    #lightbox img{max-width:90vw;max-height:90vh;border-radius:10px}
    #lightbox-close{position:absolute;top:20px;right:28px;color:#fff;font-size:2rem;cursor:pointer;line-height:1}

    /* Version toggle (P2-2) */
    .ver-btn{background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:6px 14px;font-size:.8rem;cursor:pointer}
    .ver-btn.active{background:#1e3a5f;color:#93c5fd;border-color:#3b82f6}
    /* Editing apply/reject (P2-3) */
    .sg-btn{border:none;border-radius:6px;padding:4px 12px;font-size:.78rem;cursor:pointer;margin-right:6px}
    .sg-apply{background:#14532d;color:#4ade80}
    .sg-apply.on{background:#16a34a;color:#fff}
    .sg-reject{background:#3a1d1d;color:#fca5a5}
    .sg-reject.on{background:#b91c1c;color:#fff}

    .hidden{display:none}

    /* 초안 확인 체크포인트 배너 */
    #draft-bar{
      background:#1e293b;border:1px solid #3b82f6;border-radius:10px;
      padding:12px 20px;margin-top:10px;
      display:none;flex-direction:column;gap:8px;
    }
    #draft-bar.open{display:flex}
    .draft-bar-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .draft-bar-msg{flex:1;font-size:.88rem;color:#cbd5e1}
    .draft-bar-msg strong{color:#93c5fd}
    #btn-proceed{background:#16a34a;color:#fff;padding:9px 18px;font-size:.88rem;font-weight:600}
    #btn-draft-cancel{background:#334155;color:#94a3b8;padding:9px 14px;font-size:.88rem}
    .draft-bar-bottom{display:flex;gap:8px}
    #revise-input{
      flex:1;padding:9px 14px;border:1px solid #334155;border-radius:8px;
      background:#0f172a;color:#e2e8f0;font-size:.88rem;
    }
    #btn-ai-revise{background:#7c3aed;color:#fff;padding:9px 18px;font-size:.88rem;font-weight:600}
    #btn-ai-revise:disabled{background:#475569;cursor:not-allowed}
    .draft-badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .draft-badge{background:#334155;color:#cbd5e1;padding:4px 12px;border-radius:999px;font-size:.78rem;font-weight:600}
    .draft-badge.words{background:#1e3a5f;color:#93c5fd}
    .draft-badge.cefr{background:#1c3a2c;color:#4ade80}
  </style>
</head>
<body>
  <header>
    <h1>NE Times Content Pipeline</h1>
    <span class="badge" id="status-badge">Ready</span>
    <div id="usage-meter" onclick="openUsage()" title="클릭하면 월별 사용량 그래프 (매월 1일 초기화 후 누적)" style="margin-left:auto;text-align:right;font-size:.78rem;color:#94a3b8;line-height:1.4;cursor:pointer">
      <div style="color:#cbd5e1;font-weight:600">이번 달 누적 사용량 📊</div>
      <div id="usage-tokens">0 tokens</div>
      <div id="usage-cost" style="color:#4ade80;font-weight:600">$0.0000</div>
    </div>
  </header>

  <!-- 월별 사용량 그래프 모달 -->
  <div id="usage-modal" onclick="if(event.target===this)closeUsage()"
       style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:950;align-items:flex-start;justify-content:center;padding-top:60px">
    <div style="background:#1e293b;border-radius:12px;width:680px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;border:1px solid #334155">
      <div style="padding:16px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between">
        <h3 style="font-size:.95rem;font-weight:600">월별 토큰 사용량 · 비용 <span style="font-size:.75rem;color:#64748b;font-weight:400">(매월 1일 초기화 후 누적)</span></h3>
        <button onclick="closeUsage()" style="background:none;border:none;color:#94a3b8;font-size:1.4rem;cursor:pointer;padding:0">&times;</button>
      </div>
      <div id="usage-chart" style="overflow-y:auto;flex:1;padding:18px 20px"></div>
    </div>
  </div>

  <main>
    <div class="form-row">
      <input type="text" id="topic" placeholder="Enter topic (e.g. Climate change and young activists)">
      <select id="level">
        {% for lv in levels %}
        <option value="{{lv.value}}" {% if lv.value == 'junior' %}selected{% endif %}>{{lv.label}}</option>
        {% endfor %}
      </select>
      <select id="section">
        {% for sc in sections %}
        <option value="{{sc.value}}">{{sc.label}}</option>
        {% endfor %}
      </select>
      <select id="page" title="지면 선택 (P1-1)"></select>
      <button id="btn-run" onclick="runPipeline()">Generate</button>
      <button style="background:#1e293b;color:#94a3b8;border:1px solid #334155" onclick="openHistory()">모두 보기</button>
    </div>
    <div class="form-row" style="margin-bottom:56px;margin-top:8px">
      <input type="url" id="source-url" placeholder="기사 링크 삽입 (선택) — URL로 원문 기반 자동 생성" style="flex:1;padding:8px 14px;font-size:.95rem">
    </div>
      <a id="btn-sheet" href="#" target="_blank" class="hidden"
         style="padding:10px 20px;background:#166534;color:#4ade80;border-radius:8px;font-size:.9rem;font-weight:500;text-decoration:none">
        📊 시트 열기
      </a>
      <button id="btn-publish" class="hidden" onclick="publishArticle()"
         style="padding:10px 20px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:500;cursor:pointer">
        🚀 발행하기
      </button>
    </div>

    <!-- Log -->
    <div id="log-box" class="hidden"></div>

    <!-- 초안 확인 체크포인트 배너 (로그 바로 아래) -->
    <div id="draft-bar">
      <div class="draft-bar-top">
        <div class="draft-bar-msg">
          <strong>📋 기사 초안이 완성됐습니다.</strong>
          검토 후 나머지 작업(교정·크로스워드·워크북·번역·이미지·검수·시트저장)을 진행하세요.
        </div>
        <button id="btn-proceed" onclick="proceedWithWork()">이후 작업 진행 ▶</button>
        <button id="btn-draft-cancel" onclick="closeDraftBar()">취소</button>
      </div>
      <div class="draft-bar-bottom">
        <input id="revise-input" type="text"
          placeholder="수정 지시 또는 질문 — 예: 두 번째 문단 더 쉽게 / 표절 경고 왜 떴어?">
        <button id="btn-ai-revise" onclick="reviseArticle()">AI 수정</button>
      </div>
    </div>

    <!-- Result area -->
    <div id="result-area" class="hidden">
      <div class="tabs">
        <div class="tab active" data-tab="article">Article</div>
        <div class="tab" data-tab="korean">한국어</div>
        <div class="tab" data-tab="plagiarism">Plagiarism</div>
        <div class="tab" data-tab="editing">Editing</div>
        <div class="tab" data-tab="crossword">Crossword</div>
        <div class="tab" data-tab="workbook">Workbook</div>
        <div class="tab" data-tab="image-v1">이미지 V1</div>
        <div class="tab" data-tab="image-v2">이미지 V2</div>
        <div class="tab" data-tab="review">검수</div>
      </div>

      <div class="panel active" id="panel-article"></div>
      <div class="panel" id="panel-korean"></div>
      <div class="panel" id="panel-plagiarism"></div>
      <div class="panel" id="panel-editing"></div>
      <div class="panel" id="panel-crossword"></div>
      <div class="panel" id="panel-workbook"></div>
      <div class="panel" id="panel-image-v1"></div>
      <div class="panel" id="panel-image-v2"></div>
      <div class="panel" id="panel-review"></div>
    </div>
  </main>

  <!-- History modal -->
  <div id="history-modal" onclick="if(event.target===this)closeHistory()">
    <div class="history-box">
      <div class="history-header">
        <h3>전체 검색 히스토리</h3>
        <button class="history-close" onclick="closeHistory()">&times;</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io();
    const logBox = document.getElementById("log-box");
    const badge = document.getElementById("status-badge");
    const btnRun = document.getElementById("btn-run");
    let _mySid = "";

    socket.on("connect", () => { _mySid = socket.id; refreshUsage(); });

    // ── 누적 토큰·비용 미터 ───────────────────────────────────────
    function renderUsage(u) {
      if (!u) return;
      const t = (u.total_tokens || 0).toLocaleString();
      document.getElementById("usage-tokens").textContent = `${t} tokens · ${u.calls || 0} calls`;
      document.getElementById("usage-cost").textContent = `$${(u.cost_usd || 0).toFixed(4)}`;
    }
    async function refreshUsage() {
      try { renderUsage(await (await fetch("/api/usage")).json()); } catch (e) {}
    }

    // ── 월별 사용량 그래프 ────────────────────────────────────────
    function _monthLabel(mk) {
      const [y, m] = mk.split("-");
      return `${y}.${m}`;
    }
    async function openUsage() {
      const el = document.getElementById("usage-chart");
      el.innerHTML = '<p style="color:#64748b;font-size:.85rem">불러오는 중…</p>';
      document.getElementById("usage-modal").style.display = "flex";
      let data = [];
      try { data = await (await fetch("/api/usage/monthly")).json(); } catch (e) {}
      if (!data.length) {
        el.innerHTML = '<p style="color:#64748b;font-size:.85rem">아직 사용 기록이 없습니다.</p>';
        return;
      }
      const maxTok = Math.max(...data.map(d => d.total_tokens), 1);
      const totalCost = data.reduce((s, d) => s + (d.cost_usd || 0), 0);
      const totalTok = data.reduce((s, d) => s + (d.total_tokens || 0), 0);
      const curMonth = (new Date()).toISOString().slice(0, 7);
      const bars = data.map(d => {
        const pct = Math.max(2, Math.round(d.total_tokens / maxTok * 100));
        const isCur = d.month === curMonth;
        const color = isCur ? "#4ade80" : "#3b82f6";
        return `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="width:58px;font-size:.8rem;color:${isCur ? '#4ade80' : '#94a3b8'};font-weight:${isCur ? 700 : 400}">${_monthLabel(d.month)}</div>
            <div style="flex:1;background:#0f172a;border-radius:6px;overflow:hidden;height:26px;position:relative">
              <div style="width:${pct}%;height:100%;background:${color};border-radius:6px;transition:width .3s"></div>
              <div style="position:absolute;left:8px;top:0;height:26px;display:flex;align-items:center;font-size:.72rem;color:#e2e8f0">
                ${d.total_tokens.toLocaleString()} tok · $${(d.cost_usd || 0).toFixed(2)} · ${d.calls} calls
              </div>
            </div>
          </div>`;
      }).join("");
      el.innerHTML = `
        <div style="display:flex;gap:18px;margin-bottom:16px;flex-wrap:wrap">
          <div><div style="font-size:.72rem;color:#64748b">전체 합계 토큰</div><div style="font-size:1.1rem;font-weight:700;color:#93c5fd">${totalTok.toLocaleString()}</div></div>
          <div><div style="font-size:.72rem;color:#64748b">전체 합계 비용</div><div style="font-size:1.1rem;font-weight:700;color:#4ade80">$${totalCost.toFixed(4)}</div></div>
          <div><div style="font-size:.72rem;color:#64748b">집계 개월</div><div style="font-size:1.1rem;font-weight:700;color:#e2e8f0">${data.length}개월</div></div>
        </div>
        ${bars}
        <p style="margin-top:10px;font-size:.72rem;color:#64748b">초록색 막대 = 이번 달 (진행 중) · 매월 1일 0부터 다시 누적</p>`;
    }
    function closeUsage() {
      document.getElementById("usage-modal").style.display = "none";
    }

    // ── 지면 선택 (P1-1) ──────────────────────────────────────────
    const PAGES = {{ pages | tojson }};
    function refreshPages() {
      const lv = document.getElementById("level").value;
      const sel = document.getElementById("page");
      const list = PAGES[lv] || [];
      sel.innerHTML = list.map(p => `<option value="${p.page}">${p.label}</option>`).join("")
        || `<option value="">기본</option>`;
    }
    document.getElementById("level").addEventListener("change", refreshPages);
    refreshPages();

    // Tab switching
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
      });
    });

    socket.on("log", ({message}) => {
      logBox.classList.remove("hidden");
      const p = document.createElement("p");
      p.textContent = message;
      logBox.appendChild(p);
      logBox.scrollTop = logBox.scrollHeight;
    });

    // Phase 1 완료 — 초안 표시 + 체크포인트 배너
    socket.on("draft_done", ({result, usage}) => {
      _clientRunning = false;
      setRunning(false);
      renderResult(result);
      renderUsage(usage);
      openDraftBar();
    });

    let _publishIdx = null;

    socket.on("pipeline_done", ({result, usage, idx}) => {
      _clientRunning = false;
      setRunning(false);
      renderResult(result);
      renderUsage(usage);
      closeDraftBar();
      // 발행 버튼 표시
      if (idx !== undefined && idx !== null) {
        _publishIdx = idx;
        document.getElementById("btn-publish").classList.remove("hidden");
      }
    });

    async function publishArticle() {
      if (_publishIdx === null) return;
      if (!confirm("이 기사를 https://jp7856.github.io/ne-times-site/ 에 발행하시겠습니까?")) return;
      const btn = document.getElementById("btn-publish");
      btn.disabled = true;
      btn.textContent = "발행 중...";
      try {
        const resp = await fetch("/api/publish", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ idx: _publishIdx }),
        });
        const data = await resp.json();
        if (resp.ok) {
          btn.textContent = "✅ 발행 완료";
          btn.style.background = "#166534";
          btn.onclick = null;
        } else {
          btn.textContent = "🚀 발행하기";
          btn.disabled = false;
          alert("발행 실패: " + (data.error || "알 수 없는 오류"));
        }
      } catch (e) {
        btn.textContent = "🚀 발행하기";
        btn.disabled = false;
        alert("발행 실패: " + e.message);
      }
    }

    socket.on("pipeline_error", ({error}) => {
      _clientRunning = false;
      setRunning(false);
      closeDraftBar();
      alert("Error: " + error);
    });

    socket.on("pipeline_stopped", () => {
      _clientRunning = false;
      setRunning(false);
      closeDraftBar();
      const p = document.createElement("p");
      p.style.color = "#f87171";
      p.textContent = "■ 사용자가 작업을 중단했습니다.";
      logBox.appendChild(p);
      logBox.scrollTop = logBox.scrollHeight;
    });

    let _clientRunning = false;

    async function runPipeline() {
      if (_clientRunning) return;
      const sourceUrl = document.getElementById("source-url").value.trim();
      let topic = document.getElementById("topic").value.trim();
      if (!topic && !sourceUrl) { alert("Please enter a topic."); return; }
      if (!topic) topic = sourceUrl; // URL만 있으면 URL을 토픽으로 사용

      _clientRunning = true;
      setRunning(true);
      logBox.innerHTML = "";
      logBox.classList.remove("hidden");
      document.getElementById("result-area").classList.add("hidden");

      const resp = await fetch("/api/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          topic,
          level: document.getElementById("level").value,
          section: document.getElementById("section").value,
          sid: _mySid,
          source_url: document.getElementById("source-url").value.trim(),
          page: document.getElementById("page").value,
        }),
      });
      if (!resp.ok) {
        const data = await resp.json();
        alert("Error: " + data.error);
        _clientRunning = false;
        setRunning(false);
      }
    }

    let _usagePoller = null;
    function setRunning(running) {
      btnRun.disabled = running;
      badge.textContent = running ? "Running..." : "Ready";
      badge.className = "badge" + (running ? " running" : "");
      // 실행 중 2초마다 토큰 실시간 갱신
      if (running && !_usagePoller) {
        _usagePoller = setInterval(refreshUsage, 2000);
      } else if (!running && _usagePoller) {
        clearInterval(_usagePoller);
        _usagePoller = null;
        refreshUsage(); // 최종값 한번 더 갱신
      }
    }

    // ── 러닝 배지 hover/클릭 → 중단 ───────────────────────────────
    badge.addEventListener("mouseenter", () => {
      if (!_clientRunning) return;
      badge.classList.add("stop-hover");
      badge.textContent = "Running... — 클릭하여 중단";
    });
    badge.addEventListener("mouseleave", () => {
      badge.classList.remove("stop-hover");
      if (_clientRunning) badge.textContent = "Running...";
    });
    badge.addEventListener("click", async () => {
      if (!_clientRunning) return;
      badge.textContent = "중단 중...";
      try {
        await fetch("/api/stop", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ sid: _mySid }),
        });
      } catch (e) {}
    });

    let _lastResult = null;

    function renderResult(r) {
      _lastResult = r;
      document.getElementById("result-area").classList.remove("hidden");

      // 상태 배너 (NEEDS_REVIEW / 검수 통과)
      let banner = "";
      const needsReview = r.status === "검수필요";
      if (needsReview) {
        const rv = r.review || {};
        const issues = [
          ...(rv.factual_issues || []).map(i => `사실오류: ${esc(i)}`),
          ...(rv.temporal_issues || []).map(i => `시제오류: ${esc(i)}`),
        ];
        banner = `<div style="background:#7f1d1d;border:1px solid #b91c1c;border-radius:10px;padding:14px 16px;margin-bottom:16px">
          <strong style="color:#fca5a5">⚠ 검수 필요 — 다운스트림 보류됨</strong>
          <p style="font-size:.85rem;color:#fecaca;margin-top:6px">${esc(rv.notes || r.research?.note || "사실·시제 검증을 통과하지 못했습니다.")}</p>
          ${issues.length ? `<ul style="margin:8px 0 0 18px;font-size:.82rem;color:#fecaca">${issues.map(i => `<li>${i}</li>`).join("")}</ul>` : ""}
          <p style="font-size:.78rem;color:#f87171;margin-top:8px">번역·이미지·시트 저장이 보류되었습니다. 편집자 확인 후 재실행하세요.</p>
        </div>`;
      } else if (r.review) {
        banner = `<div style="background:#14532d;border:1px solid #166534;border-radius:10px;padding:10px 14px;margin-bottom:16px">
          <strong style="color:#4ade80">✓ 사실·시제 검수 통과</strong>
          <span style="font-size:.8rem;color:#86efac;margin-left:8px">재작성 ${r.review.rewrite_count || 0}회 · 표절검사 ${r.plagiarism.passed ? "통과" : "경고"}</span>
        </div>`;
      }

      // 실시간 리서치 출처 (실제 fetch한 URL)
      const rs = r.research || {};
      const researchHtml = (rs.sources && rs.sources.length)
        ? `<h2 style="margin-top:16px">리서치 출처 (실제 수집 ${rs.sources.length}건)</h2>
           ${rs.sources.map(s => `<a class="source-link" href="${esc(s.url)}" target="_blank">${esc(s.title || s.url)}</a>`).join("")}`
        : "";

      // Article — 지면 CEFR 배지 계산
      const _pageVal = document.getElementById("page").value;
      const _pageList = PAGES[r.level] || [];
      const _pageCfg = _pageList.find(p => p.page === _pageVal) || _pageList[0];
      let _cefrBadge = "";
      if (_pageCfg) { const m = _pageCfg.label.match(/·\s*([^·]+?)\s*·/); if (m) _cefrBadge = m[1].trim(); }

      document.getElementById("panel-article").innerHTML = `
        ${banner}
        <h2>Article</h2>
        <div style="margin-bottom:10px">
          <span class="stat">${r.level.toUpperCase()}</span>
          <span class="stat">${r.section}</span>
          <span class="stat">${r.article.word_count} words</span>
          ${_cefrBadge ? `<span class="stat" style="background:#1c3a2c;color:#4ade80">${esc(_cefrBadge)}</span>` : ""}
        </div>
        ${(r.alternate_text) ? `
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button class="ver-btn active" id="ver-sel" onclick="showVersion('sel')">${esc(r.selected_variant || "추천")} (선택됨)</button>
          <button class="ver-btn" id="ver-alt" onclick="showVersion('alt')">${esc(r.alternate_label || "대안")}</button>
          <button style="margin-left:auto;background:#16a34a;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:.8rem;cursor:pointer" onclick="selectAlternate()">이 버전으로 저장·재생성</button>
        </div>` : ""}
        <div class="article-text" id="article-body" contenteditable="true" spellcheck="false"
          style="outline:none;border:1px solid transparent;border-radius:6px;transition:border-color .2s"
          onfocus="this.style.borderColor='#3b82f6'"
          onblur="this.style.borderColor='transparent';if(_lastResult)_lastResult.article.text=this.innerText.trim()"
        >${esc(r.article.text || "(생성 보류됨)")}</div>
        <h2 style="margin-top:20px">Vocabulary ${(r.article.vocabulary_detail && r.article.vocabulary_detail.length) ? `<span class="stat">${r.article.vocabulary_detail.length} words</span>` : ""}</h2>
        ${(r.article.vocabulary_detail && r.article.vocabulary_detail.length)
          ? `<div>${r.article.vocabulary_detail.map(v => `<span class="vocab-tag">${esc(v.word)} <span style="color:#64748b">${esc(v.cefr)}</span> · ${esc(v.meaning_ko)}</span>`).join("")}</div>`
          : `<div>${r.article.vocabulary.map(w => `<span class="vocab-tag">${esc(w)}</span>`).join("")}</div>`}
        ${researchHtml}
      `;

      // Korean
      document.getElementById("panel-korean").innerHTML = `
        <h2>한국어 번역</h2>
        ${r.article.summary_ko ? `
        <div style="background:#0f172a;border-radius:8px;padding:14px;margin-bottom:16px">
          <h2 style="margin-bottom:8px">요약</h2>
          <p style="font-size:.9rem;line-height:1.8;color:#94a3b8">${esc(r.article.summary_ko)}</p>
        </div>` : ""}
        <div class="article-text">${esc(r.article.text_ko || "번역 없음")}</div>
      `;

      // Plagiarism
      const pStatus = r.plagiarism.passed;
      let checkHtml = "";
      for (const [key, val] of Object.entries(r.plagiarism.checklist)) {
        const st = val.pass ? "pass" : "fail";
        checkHtml += `<div class="check-item"><span class="status ${st}">${val.pass ? "PASS" : "FAIL"}</span>${esc(key)}: ${esc(val.note || "")}</div>`;
      }
      document.getElementById("panel-plagiarism").innerHTML = `
        <h2>Plagiarism Check</h2>
        <span class="stat ${pStatus ? 'pass' : 'fail'}">${pStatus ? 'ALL PASSED' : 'WARNING'}</span>
        <div style="margin-top:12px">${checkHtml}</div>
        ${r.plagiarism.notes ? `<p style="margin-top:12px;color:#94a3b8;font-size:.85rem">${esc(r.plagiarism.notes)}</p>` : ""}
      `;

      // Editing (P2-3: 제안별 적용/거부 + 반영 재생성)
      let editHtml = r.editing.length === 0 ? '<p style="color:#4ade80">No issues found.</p>' : "";
      r.editing.forEach((s, i) => {
        editHtml += `<div class="suggestion" data-i="${i}">
          <div class="orig">"${esc(s.original)}"</div>
          <div class="arrow">&#8595;</div>
          <div class="sugg">"${esc(s.suggestion)}"</div>
          <div class="reason">${esc(s.reason)}</div>
          <div style="margin-top:6px">
            <button class="sg-btn sg-apply" onclick="markSuggestion(${i},'apply',this)">적용</button>
            <button class="sg-btn sg-reject" onclick="markSuggestion(${i},'reject',this)">거부</button>
          </div>
        </div>`;
      });
      document.getElementById("panel-editing").innerHTML = `
        <h2>Editing Suggestions <span class="stat">${r.editing.length} items</span></h2>
        ${editHtml}
        ${r.editing.length ? `<button style="margin-top:14px;background:#16a34a;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:.85rem;cursor:pointer" onclick="applyEdits()">선택한 제안 반영하고 재생성</button>` : ""}
      `;
      _editChoices = {};

      // Crossword
      let cwHtml = "";
      for (const c of r.crossword) {
        cwHtml += `<div class="cw-card">
          <span class="cw-word">${esc(c.word)}</span><span class="cw-korean">${esc(c.korean_definition)}</span>
          <div class="cw-sentence"><span class="cw-label">B1</span>${esc(c.sentence_b1)}</div>
          <div class="cw-sentence"><span class="cw-label">B1-B2</span>${esc(c.sentence_b1_b2)}</div>
        </div>`;
      }
      document.getElementById("panel-crossword").innerHTML = `
        <h2>Crossword Sentences <span class="stat">${r.crossword.length} pairs</span></h2>
        ${cwHtml}
      `;

      // Workbook (P1-2: 레거시 8종 포맷, activity 구조)
      let wbHtml = "";
      for (const w of r.workbook) {
        const acts = (w.activities || []).map(a => `
          <div class="wb-section">
            <h4>${esc(a.label)}. ${esc(a.title)}</h4>
            ${a.instruction ? `<p style="color:#94a3b8;font-style:italic">${esc(a.instruction)}</p>` : ""}
            <p style="white-space:pre-wrap">${esc(a.body)}</p>
            ${a.answer ? `<p style="color:#4ade80;font-size:.8rem;margin-top:4px">정답: ${esc(a.answer)}</p>` : ""}
          </div>`).join("");
        wbHtml += `<div class="wb-set">
          <h3>Set ${w.set_number} <span class="stat" style="margin-left:6px">${esc(w.format_name || w.format_key || "")}</span></h3>
          ${acts || '<p style="color:#64748b">활동 없음</p>'}
        </div>`;
      }
      document.getElementById("panel-workbook").innerHTML = `
        <h2>Workbook Activities <span class="stat">${r.workbook.length} sets</span></h2>
        ${wbHtml}
      `;

      // Image V1 / V2
      renderImageV1(r);
      renderImageV2(r);

      // 검수 (Agent 5 — 사실·시제 검증)
      renderReview(r);

      // 시트 링크
      const btnSheet = document.getElementById("btn-sheet");
      if (r.sheet_url) {
        btnSheet.href = r.sheet_url;
        btnSheet.classList.remove("hidden");
      } else {
        btnSheet.classList.add("hidden");
      }

    }

    function esc(s) {
      if (!s) return "";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── 검수 패널 (Agent 5 — 사실·시제 검증) ─────────────────────
    function renderReview(r) {
      const rv = r.review;
      const el = document.getElementById("panel-review");
      if (!rv) {
        el.innerHTML = `<h2>검수 (Agent 5)</h2>
          <p style="color:#64748b;font-size:.85rem">검수 정보가 없습니다.</p>`;
        return;
      }
      const passed = rv.passed && !rv.needs_human_review;
      const factual = rv.factual_issues || [];
      const temporal = rv.temporal_issues || [];
      const statusBox = passed
        ? `<div style="background:#14532d;border:1px solid #166534;border-radius:10px;padding:12px 16px;margin-bottom:14px">
             <strong style="color:#4ade80">✓ 검수 통과</strong>
             <span style="font-size:.8rem;color:#86efac;margin-left:8px">사실·시제 검증 통과 · 재작성 ${rv.rewrite_count || 0}회</span>
           </div>`
        : `<div style="background:#7f1d1d;border:1px solid #b91c1c;border-radius:10px;padding:12px 16px;margin-bottom:14px">
             <strong style="color:#fca5a5">⚠ 검수 미통과 — 편집자 확인 필요</strong>
             <span style="font-size:.8rem;color:#fecaca;margin-left:8px">재작성 ${rv.rewrite_count || 0}회</span>
           </div>`;
      const issueList = (title, arr, color) => arr.length
        ? `<h2 style="margin-top:14px">${title} <span class="stat fail">${arr.length}</span></h2>
           <ul style="margin:6px 0 0 18px;font-size:.85rem;line-height:1.7;color:${color}">
             ${arr.map(i => `<li>${esc(i)}</li>`).join("")}</ul>`
        : `<h2 style="margin-top:14px">${title} <span class="stat pass">없음</span></h2>`;
      el.innerHTML = `
        <h2>검수 (Agent 5 — 사실·시제 검증)</h2>
        ${statusBox}
        ${issueList("사실 오류 (Factual)", factual, "#fecaca")}
        ${issueList("시제·시점 오류 (Temporal)", temporal, "#fecaca")}
        ${rv.notes ? `<h2 style="margin-top:14px">검수 메모</h2>
          <p style="font-size:.85rem;line-height:1.7;color:#94a3b8;white-space:pre-wrap">${esc(rv.notes)}</p>` : ""}
      `;
    }

    // ── 초안 체크포인트 배너 ──────────────────────────────────────
    function openDraftBar() {
      document.getElementById("draft-bar").classList.add("open");
      document.getElementById("revise-input").value = "";
    }
    function closeDraftBar() {
      document.getElementById("draft-bar").classList.remove("open");
      document.querySelector("main").style.paddingBottom = "";
    }

    // 이후 작업 진행 — 현재 표시된 기사로 Phase 2 실행
    function proceedWithWork() {
      if (!_lastResult) return;
      const body = document.getElementById("article-body");
      const currentText = body ? body.textContent.trim() : _lastResult.article.text;
      closeDraftBar();
      regenerate(currentText);
    }

    // AI 어시스턴트 — 수정 지시 또는 질문 처리 + 로그에 대화 기록
    async function reviseArticle() {
      if (!_lastResult) return;
      const input = document.getElementById("revise-input");
      const instruction = input.value.trim();
      if (!instruction) return;
      const body = document.getElementById("article-body");
      const currentText = body ? body.textContent.trim() : _lastResult.article.text;
      const btn = document.getElementById("btn-ai-revise");
      btn.disabled = true;
      btn.textContent = "처리 중...";

      // 로그에 사용자 입력 기록
      logBox.classList.remove("hidden");
      const pUser = document.createElement("p");
      pUser.style.color = "#93c5fd";
      pUser.textContent = "▶ " + instruction;
      logBox.appendChild(pUser);
      logBox.scrollTop = logBox.scrollHeight;
      input.value = "";

      try {
        const resp = await fetch("/api/revise", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ article_text: currentText, instruction, level: _lastResult.level }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          const pErr = document.createElement("p");
          pErr.style.color = "#f87171";
          pErr.textContent = "오류: " + data.error;
          logBox.appendChild(pErr);
          return;
        }
        // 로그에 Claude 응답 기록
        const pRes = document.createElement("p");
        pRes.style.color = "#4ade80";
        pRes.textContent = "◀ " + data.message;
        logBox.appendChild(pRes);
        logBox.scrollTop = logBox.scrollHeight;

        // 수정 요청이면 article-body 업데이트
        if (data.type === "revision" && data.revised_text) {
          if (body) body.textContent = data.revised_text;
          _lastResult.article.text = data.revised_text;
          const pUpd = document.createElement("p");
          pUpd.style.color = "#94a3b8";
          pUpd.textContent = "  → 기사 본문이 업데이트됐습니다.";
          logBox.appendChild(pUpd);
          logBox.scrollTop = logBox.scrollHeight;
        }
      } catch (e) {
        const pErr = document.createElement("p");
        pErr.style.color = "#f87171";
        pErr.textContent = "오류: " + e.message;
        logBox.appendChild(pErr);
      } finally {
        btn.disabled = false;
        btn.textContent = "AI 수정";
      }
    }

    // 엔터키로 AI 수정 실행
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("revise-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") reviseArticle();
      });
    });

    // ── P2-2: 버전 토글/선택 ──────────────────────────────────────
    function showVersion(which) {
      if (!_lastResult) return;
      const body = document.getElementById("article-body");
      document.getElementById("ver-sel").classList.toggle("active", which === "sel");
      document.getElementById("ver-alt").classList.toggle("active", which === "alt");
      body.textContent = which === "alt" ? _lastResult.alternate_text : _lastResult.article.text;
    }
    function selectAlternate() {
      if (!_lastResult || !_lastResult.alternate_text) return;
      if (!confirm(`'${_lastResult.alternate_label}' 버전으로 저장하고 번역·워크북·이미지를 재생성합니다. 계속할까요?`)) return;
      regenerate(_lastResult.alternate_text);
    }

    // ── P2-3: 제안 적용/거부 + 반영 재생성 ────────────────────────
    let _editChoices = {};
    function markSuggestion(i, choice, btn) {
      _editChoices[i] = choice;
      const wrap = btn.parentElement;
      wrap.querySelector(".sg-apply").classList.toggle("on", choice === "apply");
      wrap.querySelector(".sg-reject").classList.toggle("on", choice === "reject");
    }
    function applyEdits() {
      if (!_lastResult) return;
      let text = _lastResult.article.text;
      let applied = 0;
      _lastResult.editing.forEach((s, i) => {
        if (_editChoices[i] === "apply" && s.original && text.includes(s.original)) {
          text = text.replace(s.original, s.suggestion);
          applied++;
        }
      });
      if (!applied) { alert("적용할 제안을 하나 이상 선택하세요."); return; }
      if (!confirm(`${applied}건의 제안을 반영하고 다운스트림을 재생성합니다. 계속할까요?`)) return;
      regenerate(text);
    }

    // ── 공통 재생성 호출 (P2-2/P2-3) ──────────────────────────────
    async function regenerate(finalText) {
      if (_clientRunning || !_lastResult) return;
      _clientRunning = true;
      setRunning(true);
      logBox.innerHTML = "";
      logBox.classList.remove("hidden");
      document.getElementById("result-area").classList.add("hidden");
      const resp = await fetch("/api/regenerate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          sid: _mySid,
          final_text: finalText,
          topic: _lastResult.topic,
          level: _lastResult.level,
          section: _lastResult.section,
          page: document.getElementById("page").value,
          sources: (_lastResult.research && _lastResult.research.sources)
            ? _lastResult.research.sources.map(s => s.url) : (_lastResult.article.sources || []),
        }),
      });
      if (!resp.ok) {
        const d = await resp.json(); alert("Error: " + d.error);
        _clientRunning = false; setRunning(false);
      }
    }

    // ── Image panels ─────────────────────────────────────────────
    let _imazinePopup = null;
    let _currentImageUrl = "";
    let _currentArticleText = "";

    function _imagePreviewHtml(imgUrl, wrapId, badgeId, urlId) {
      const imgHtml = imgUrl
        ? `<img src="${esc(imgUrl)}" alt="article image" onclick="openLightbox(this.src)">`
        : `<div class="img-no-image">이미지 없음</div>`;
      return `
        <div class="img-panel">
          <div class="img-preview" id="${wrapId}">${imgHtml}</div>
          <div class="img-info">
            <p id="${urlId}">${imgUrl ? esc(imgUrl) : "이미지를 찾지 못했습니다."}</p>
            <span class="stat" id="${badgeId}" style="display:inline-block;margin-bottom:12px">${imgUrl ? "자동선택" : "없음"}</span>
          </div>
        </div>`;
    }

    function renderImageV1(r) {
      _currentImageUrl = r.image_url || "";
      _currentArticleText = r.article?.text || "";
      document.getElementById("panel-image-v1").innerHTML = `
        <h2>이미지 V1 — 검색어 생성기</h2>
        ${_imagePreviewHtml(_currentImageUrl, "img-wrap-v1", "img-badge-v1", "img-url-v1")}
        <div style="margin-top:16px">
          <a class="btn-search" href="https://jp7856.github.io/imazine/" target="imazine-popup"
             onclick="openImageSite(event,'https://jp7856.github.io/imazine/')">imazine 열기</a>
          <p style="margin-top:10px;font-size:.8rem;color:#475569">
            검색어를 생성하고 이미지 URL을 붙여넣으면 자동 업데이트됩니다.
          </p>
        </div>`;
    }

    function renderImageV2(r) {
      _currentImageUrl = r.image_url || "";
      const sel = r.image_selected;
      const licHtml = sel ? `
        <div style="background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:.78rem;color:#94a3b8">
          <strong style="color:#cbd5e1">라이선스 증빙</strong><br>
          검색어: ${esc(r.image_query || "")}<br>
          촬영: ${esc(sel.photographer)} · 출처: ${esc(sel.source)}<br>
          라이선스: ${esc(sel.license)}<br>
          확인일: ${esc(sel.confirmed_date)} ·
          <a href="${esc(sel.page_url)}" target="_blank" style="color:#60a5fa">원본 페이지</a>
        </div>` : "";
      const cands = (r.image_candidates || []);
      const candHtml = cands.length > 1 ? `
        <h2 style="margin-top:16px">후보 ${cands.length}건</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${cands.map(c => `<img src="${esc(c.thumb || c.url)}" title="${esc(c.photographer)}"
              style="width:90px;height:60px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid ${c.url===_currentImageUrl?'#3b82f6':'#334155'}"
              onclick="openLightbox('${esc(c.url)}')">`).join("")}
        </div>` : "";
      document.getElementById("panel-image-v2").innerHTML = `
        <h2>이미지 V2 — Unsplash 자동 추천 + 직접 검색</h2>
        ${_imagePreviewHtml(_currentImageUrl, "img-wrap-v2", "img-badge-v2", "img-url-v2")}
        ${licHtml}
        ${candHtml}
        <div style="margin-top:16px">
          <a class="btn-search" href="https://jp7856.github.io/ne-times-image-finder/" target="imazine-popup"
             style="background:#3b82f6"
             onclick="openImageSite(event,'https://jp7856.github.io/ne-times-image-finder/')">Image Finder 열기</a>
          <p style="margin-top:10px;font-size:.8rem;color:#475569">
            이미지를 클릭하면 바로 파이프라인에 반영됩니다.
          </p>
        </div>`;
    }

    function openImageSite(e, url) {
      e.preventDefault();
      _imazinePopup = window.open(url, "imazine-popup", "width=1000,height=700,left=200,top=100");
    }

    // 팝업 ↔ 대시보드 메시지 처리
    window.addEventListener("message", (event) => {
      if (!event.data) return;

      // 팝업이 준비됐다고 알려오면 기사 본문 전송
      if (event.data.type === "ready") {
        if (_imazinePopup && !_imazinePopup.closed) {
          _imazinePopup.postMessage({ type: "prefill", text: _currentArticleText }, "*");
        }
        return;
      }

      // 팝업에서 이미지 선택 수신
      if (event.data.imageUrl) {
        _currentImageUrl = event.data.imageUrl;
        _applyImage("img-wrap-v1", "img-badge-v1", "img-url-v1");
        _applyImage("img-wrap-v2", "img-badge-v2", "img-url-v2");
        if (_imazinePopup && !_imazinePopup.closed) _imazinePopup.close();
      }
    });

    function _applyImage(wrapId, badgeId, urlId) {
      const wrap = document.getElementById(wrapId);
      const urlEl = document.getElementById(urlId);
      const badgeEl = document.getElementById(badgeId);
      if (!wrap) return;
      wrap.innerHTML = `<img src="${esc(_currentImageUrl)}" alt="article image" onclick="openLightbox(this.src)">`;
      if (urlEl) urlEl.textContent = _currentImageUrl;
      if (badgeEl) { badgeEl.textContent = "선택됨"; badgeEl.style.background = "#1e3a5f"; badgeEl.style.color = "#93c5fd"; }
    }

    // ── Lightbox ─────────────────────────────────────────────────
    function openLightbox(src) {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox").classList.add("open");
    }
    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
    }
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeLightbox(); closeHistory(); closeUsage(); } });

    // ── History ───────────────────────────────────────────────────
    async function openHistory() {
      const res = await fetch("/api/history");
      const list = await res.json();
      const el = document.getElementById("history-list");
      if (list.length === 0) {
        el.innerHTML = '<p style="padding:20px;color:#475569;font-size:.85rem">아직 생성된 콘텐츠가 없습니다.</p>';
      } else {
        el.innerHTML = [...list].reverse().map(h => `
          <div class="history-item" onclick="loadHistory(${h.idx})">
            <span class="hi-badge">${h.level.toUpperCase()}</span>
            <span class="hi-badge" style="background:#1e3a5f;color:#93c5fd">${h.section}</span>
            <span class="hi-topic">${esc(h.topic)}</span>
            <span class="hi-meta">${h.created_at}</span>
          </div>`).join("");
      }
      document.getElementById("history-modal").classList.add("open");
    }

    function closeHistory() {
      document.getElementById("history-modal").classList.remove("open");
    }

    async function loadHistory(idx) {
      const res = await fetch(`/api/history/${idx}`);
      const entry = await res.json();
      closeHistory();
      document.getElementById("result-area").classList.remove("hidden");
      renderResult(entry.result);
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      document.querySelector('[data-tab="article"]').classList.add("active");
      document.getElementById("panel-article").classList.add("active");
    }
  </script>
</body>
</html>
